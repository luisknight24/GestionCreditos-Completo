<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="trabajo1">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>trabajo1</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; background-color: #f8fafc; color: #1e293b;">
    <div style="width: 48px; height: 48px; border: 4px solid #cbd5e1; border-top: 4px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 16px; font-weight: 600; font-size: 16px;">Cargando aplicación móvil...</p>
    <style>
      #loading { transition: opacity 0.3s ease; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </div>
  <script>
    window.addEventListener('load', function() {
      var checkFlutter = setInterval(function() {
        var flutterHost = document.querySelector('flutter-view') || document.querySelector('flt-glass-pane') || document.querySelector('flt-scene-host');
        if (flutterHost || window._flutter) {
          var loader = document.getElementById('loading');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(function() { if (loader.parentNode) loader.parentNode.removeChild(loader); }, 300);
          }
          clearInterval(checkFlutter);
        }
      }, 150);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
